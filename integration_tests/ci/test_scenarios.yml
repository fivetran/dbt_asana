schema_variable_name: "asana_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "tags disabled"
    vars:
      asana__using_tags: false
      asana__using_task_tags: false
      asana_tag_identifier: missing
      asana_task_tag_identifier: missing
    include_incremental: false
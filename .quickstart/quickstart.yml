database_key: asana_database
schema_key: asana_schema

dbt_versions: ">=1.3.0 <3.0.0"

table_variables:
  asana__using_tags:
    - _tag
  asana__using_task_tags:
    - _task_tag

  _fivetran_quickstart_section:
    - section
  _fivetran_quickstart_task_follower:
    - _task_follower
  _fivetran_quickstart_task_section:
    - _task_section

destination_configurations:
  databricks:
    dispatch:
      - macro_namespace: dbt_utils
        search_order: [ 'spark_utils', 'dbt_utils' ]

public_models: [
  "asana__daily_metrics",
  "asana__user",
  "asana__task",
  "asana__team",
  "asana__project",
  "asana__tag"
]

supported_vars:
  task_pass_through_columns:
    type: dictionary
    description: "Additional `TASK` fields to include in `asana__task`"
    display_name: "Additional Task Columns"

